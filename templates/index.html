<!DOCTYPE html>
<html>
<head>
    <title>My To-Do App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .todo-card{
            width:500px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            font-weight:600;
            margin-bottom:25px;
            color:#333;
        }

        .task-item{
            background:#f5f6fa;
            padding:10px;
            margin-bottom:10px;
            border-radius:8px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            transition:0.3s;
        }

        .task-item:hover{
            background:#e8ecff;
        }

        .delete-btn{
            text-decoration:none;
            color:white;
            background:#ff4d4d;
            padding:5px 10px;
            border-radius:5px;
        }

        .delete-btn:hover{
            background:#ff1a1a;
        }

        .add-btn{
            background:#667eea;
            border:none;
        }

        .add-btn:hover{
            background:#5a6de0;
        }

    </style>

</head>

<body>

<div class="todo-card">

<h1>✨ My To-Do List</h1>

<form action="/add" method="POST" class="d-flex mb-3">

<input type="text" name="task" class="form-control me-2" placeholder="Enter new task..." required>

<button class="btn add-btn text-white">Add</button>

</form>

{% for task in tasks %}

<div class="task-item">

<span>{{ task.task }}</span>

<a class="delete-btn" href="/delete/{{task.id}}">Delete</a>

</div>

{% endfor %}

</div>

</body>
</html>
